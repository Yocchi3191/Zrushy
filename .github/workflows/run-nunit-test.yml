name: Run NUnit Test

on:
  push:
    branches: [main]
    paths:
      - "core/**/*.cs"
      - "core/**/*.csproj"
  pull_request:
    branches: [main]
    paths:
      - "core/**/*.cs"
      - "core/**/*.csproj"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test
        run: dotnet test
        working-directory: core
